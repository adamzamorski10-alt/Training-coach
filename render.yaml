services:
  - type: web
    name: fitai-api
    runtime: python311
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fitai_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://training-coach.netlify.app,https://training-coach-app.netlify.app,http://localhost:3000,http://127.0.0.1:3000"
